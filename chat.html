<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat Zoera 😈</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<h2>😈 Chat Zoera Premium</h2>

<!-- CHAT -->
<div id="chat">
<p class="system">👋 Chat iniciado!</p>
</div>

<!-- INPUT -->
<div class="input-area">
<input id="msg" type="text" placeholder="Digite algo...">
<button onclick="enviar()">Enviar</button>
</div>

<!-- COMANDOS -->
<div class="comandos">

<h3>📜 Comandos</h3>

<p>/help</p>
<p>/oi</p>
<p>/fig</p>
<p>/clear</p>

</div>

<!-- SONS -->
<div class="comandos">

<h3>🔊 Sons (opcional)</h3>

<p>/sound15 - Som automático a cada 15s</p>
<p>/soundstop - Parar som</p>

</div>

<br>

<a href="index.html">
<button>⬅ Voltar</button>
</a>

</div>

<script src="script.js"></script>

</body>
</html>
