<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat Online 😈</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:95%;
max-width:900px;
height:95vh;
display:flex;
flex-direction:column;
}

#chat{
flex:1;
background:#0f172a;
padding:20px;
border-radius:20px;
overflow-y:auto;
}

.msg{
padding:12px;
margin:8px 0;
background:#1e293b;
border-radius:12px;
}

.input-area{
display:flex;
gap:10px;
margin-top:15px;
}

input{
flex:1;
padding:15px;
border-radius:12px;
border:none;
font-size:16px;
}

button{
padding:15px;
border:none;
border-radius:12px;
background:#00ff88;
cursor:pointer;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">
<h2>💬 Chat Online</h2>

<div id="chat"></div>

<div class="input-area">
<input id="msg" placeholder="Digite algo...">
<button onclick="sendMsg()">Enviar</button>
</div>
</div>

<script>

/* 🔥 SUPABASE CONFIG */
const supabase = supabase.createClient(
"https://wyomuufhdgakozungrcv.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind5b211dWZoZGdha296dW5ncmN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMzU0MTcsImV4cCI6MjA4Nzg"
);

/* Nome usuário */
let userName = localStorage.getItem("chatName") || "User";

const chat = document.getElementById("chat");

/* Carregar mensagens */
async function loadMessages(){

const {data} = await supabase
.from("messages")
.select("*")
.order("created_at",{ascending:true});

chat.innerHTML="";

if(data){
data.forEach(m=>{
let div = document.createElement("div");
div.className="msg";
div.innerText = m.nome + ": " + m.texto;
chat.appendChild(div);
});
}

chat.scrollTop = chat.scrollHeight;
}

loadMessages();

/* Tempo real */
supabase
.channel("messages")
.on("postgres_changes",
{event:"INSERT",schema:"public",table:"messages"},
()=> loadMessages()
).subscribe();

/* Enviar mensagem */
async function sendMsg(){

let input = document.getElementById("msg");
let text = input.value;

if(text.trim()==="") return;

/* comando mudar nome */
if(text.startsWith("/nome ")){
userName = text.replace("/nome ","");
localStorage.setItem("chatName",userName);
alert("Nome alterado!");
input.value="";
return;
}

await supabase.from("messages").insert({
nome:userName,
texto:text
});

input.value="";
}

</script>

</body>
</html>
